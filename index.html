<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tip Splitter</title>

  <!-- CSS MUST BE IN HEAD -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>JOZEFA INSPIRADA</h1>
  <p>Money with a purpose. Every dollar has a home.</p>

  <div class="input-card">
    <input id="amount" type="number" placeholder="Enter tip" />

    <!-- KEEP ONLY ONE MAIN BUTTON -->
    <button id="saveBtn">SAVE</button>
    <button id="deleteLast">DELETE LAST</button>
  </div>

  <div class="summary">
    <h2>Total</h2>
    <div id="result"></div>
  </div>

  <div id="spainFlow"></div>

  <hr>

  <h2>This Month</h2>

  <div id="progress"></div>

  <div class="controls">
    <button id="resetMonth">Reset Month</button>
    <button id="resetAll">Reset All</button>
  </div>

</div>

<!-- OPTIONAL: sticky action (do NOT duplicate IDs above) -->
<div class="sticky-action">
  <button id="stickySaveBtn">ADD TIP</button>
</div>

<script src="app.js"></script>

</body>
</html>
