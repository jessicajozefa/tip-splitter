<h1 style="color:red">DEPLOY TEST 999</h1>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Tip Flow System</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 20px;
  background: #fff;
  color: #111;
}

.dark { background:#111; color:#eee; }

input {
  font-size: 20px;
  padding: 12px;
  width: 90%;
  max-width: 300px;
}

button {
  padding: 10px 14px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

.save {
  font-size: 24px;
  background: #2ecc71;
  color: white;
  border: none;
}

.card {
  border: 1px solid #ccc;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

.bar {
  height: 14px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: #2ecc71;
}
</style>
</head>

<body>

<h2>Tip Flow System</h2>

<button onclick="toggleDark()">Dark Mode</button>
<button onclick="summary()">Today Summary</button>

<br/><br/>

<input id="amount" type="number" placeholder="Enter tip" />
<br/>

<button class="save" onclick="addTip()">SAVE TIP</button>

<div>
<button onclick="quick(20)">$20</button>
<button onclick="quick(50)">$50</button>
<button onclick="quick(100)">$100</button>
</div>

<div class="card">
<h3>Latest Tip Breakdown</h3>
<div id="latest"></div>
</div>

<div class="card">
<h3>System Totals</h3>

<p><b>Total Tips:</b> $<span id="total"></span></p>

<p><b>Rent (30%):</b> $<span id="rent"></span></p>

<p><b>CC (40%):</b> $<span id="cc"></span> / $2000</p>

<p><b>Taxes (12%):</b> $<span id="tax"></span></p>

<p><b>Insurance (12.4%):</b> $<span id="ins"></span></p>

<p><b>IRA (5.6%):</b> $<span id="ira"></span></p>

<br/>

<div>CC Progress</div>
<div class="bar"><div id="ccBar" class="fill"></div></div>

</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

<script>

let tips = JSON.parse(localStorage.getItem("tips") || "[]");

function addTip() {
  let val = parseFloat(document.getElementById("amount").value);
  if (!val) return;

  let entry = {
    amount: val,
    rent: val * 0.30,
    cc: val * 0.40,
    tax: val * 0.12,
    ins: val * 0.124,
    ira: val * 0.056,
    time: new Date().toLocaleString()
  };

  tips.push(entry);
  localStorage.setItem("tips", JSON.stringify(tips));

  document.getElementById("amount").value = "";
  update();
}

function quick(v){
  document.getElementById("amount").value = v;
  addTip();
}

function sum(k){
  return tips.reduce((a,b)=>a+(b[k]||0),0);
}

function update(){

  let total = sum("amount");
  let rent = sum("rent");
  let cc = sum("cc");
  let tax = sum("tax");
  let ins = sum("ins");
  let ira = sum("ira");

  let ccCap = 2000;

  document.getElementById("total").innerText = total.toFixed(2);
  document.getElementById("rent").innerText = rent.toFixed(2);
  document.getElementById("cc").innerText = cc.toFixed(2);
  document.getElementById("tax").innerText = tax.toFixed(2);
  document.getElementById("ins").innerText = ins.toFixed(2);
  document.getElementById("ira").innerText = ira.toFixed(2);

  document.getElementById("ccBar").style.width =
    Math.min((cc/ccCap)*100,100) + "%";

  document.getElementById("latest").innerHTML =
    tips.length
      ? `
        <p>$${tips[tips.length-1].amount}</p>
        <p>CC: $${tips[tips.length-1].cc.toFixed(2)}</p>
      `
      : "";

  document.getElementById("history").innerHTML =
    tips.slice().reverse()
    .map(t => `$${t.amount} — ${t.time}`)
    .join("<br>");
}

function summary(){
  let today = new Date().toDateString();

  let todayTips = tips.filter(t =>
    new Date(t.time).toDateString() === today
  );

  let total = todayTips.reduce((a,b)=>a+b.amount,0);

  alert("Today: $" + total.toFixed(2) + " across " + todayTips.length + " tips");
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

update();

</script>

</body>
</html>
