<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Offline Savings Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      transition: 0.3s;
      background: #ffffff;
      color: #111;
    }

    .dark {
      background: #111;
      color: #eee;
    }

    input {
      font-size: 22px;
      padding: 15px;
      width: 90%;
      max-width: 300px;
    }

    button {
      font-size: 16px;
      padding: 10px 14px;
      margin: 5px;
      border-radius: 8px;
    }

    .save-btn {
      font-size: 26px;
      padding: 18px 40px;
      background: #2ecc71;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      border: 1px solid #ccc;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .box {
      flex: 1;
      min-width: 140px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>Offline Savings Tracker</h2>
<p><b>Post-work quick entry mode</b></p>

<!-- END OF DAY BUTTON -->
<button onclick="todaySummary()">End-of-Day Summary</button>
<button onclick="toggleDark()">Dark Mode</button>

<br/><br/>

<input id="amount" type="number" placeholder="Enter amount" />

<br/>

<button class="save-btn" onclick="addEntry()">SAVE ENTRY</button>

<div>
  <button onclick="quickAdd(20)">$20</button>
  <button onclick="quickAdd(50)">$50</button>
  <button onclick="quickAdd(100)">$100</button>
</div>

<div class="card">
  <h3>Breakdown</h3>
  <div id="output"></div>
</div>

<div class="card">
  <h3>Totals</h3>
  <div id="totals"></div>
</div>

<div class="card">
  <h3>History</h3>
  <div id="history"></div>
</div>

<script>

let history = JSON.parse(localStorage.getItem("history") || "[]");

function addEntry() {
  let val = parseFloat(document.getElementById("amount").value);
  if (!val) return;

  let entry = {
    amount: val,
    rent: val * 0.30,
    cc: val * 0.40,
    taxes: val * 0.12,
    insurance: val * 0.124,
    ira: val * 0.056,
    time: new Date().toLocaleString()
  };

  history.push(entry);
  localStorage.setItem("history", JSON.stringify(history));

  document.getElementById("amount").value = "";
  updateUI();
}

function quickAdd(val) {
  document.getElementById("amount").value = val;
  addEntry();
}

function sum(key) {
  return history.reduce((a, b) => a + (b[key] || 0), 0).toFixed(2);
}

/* ---------------------------
   MAIN UI UPDATE FUNCTION
----------------------------*/
function updateUI() {

  let last = history[history.length - 1];

  document.getElementById("output").innerHTML = last ? `
    <div class="row">
      <div class="box">Rent: $${last.rent.toFixed(2)}</div>
      <div class="box">CC: $${last.cc.toFixed(2)}</div>
      <div class="box">Taxes: $${last.taxes.toFixed(2)}</div>
      <div class="box">Insurance: $${last.insurance.toFixed(2)}</div>
      <div class="box">IRA: $${last.ira.toFixed(2)}</div>
    </div>
  ` : "";

  let totalEntered = sum("amount");
  let rent = sum("rent");
  let cc = sum("cc");
  let taxes = sum("taxes");
  let insurance = sum("insurance");
  let ira = sum("ira");

  // MONTHLY GUARDRAIL
  let now = new Date();
  let month = now.getMonth();
  let year = now.getFullYear();

  let monthTotal = history
    .filter(h => {
      let d = new Date(h.time);
      return d.getMonth() === month && d.getFullYear() === year;
    })
    .reduce((a, b) => a + b.amount, 0);

  let cap = 2000;

  document.getElementById("totals").innerHTML = `
    <p><b>Total Entered:</b> $${totalEntered}</p>
    <p><b>Rent:</b> $${rent}</p>
    <p><b>Credit Card:</b> $${cc}</p>
    <p><b>Taxes:</b> $${taxes}</p>
    <p><b>Insurance:</b> $${insurance}</p>
    <p><b>IRA:</b> $${ira}</p>

    <hr/>

    <p><b>Monthly Progress:</b> $${monthTotal.toFixed(2)} / $${cap}</p>
    <p><b>Status:</b> ${
      monthTotal > cap
        ? "⚠️ OVER BUDGET"
        : monthTotal > cap * 0.8
        ? "⚠️ CLOSE TO LIMIT"
        : "OK"
    }</p>
  `;

  document.getElementById("history").innerHTML = history
    .slice()
    .reverse()
    .map(h => `<div>$${h.amount} — ${h.time}</div>`)
    .join("");
}

/* ---------------------------
   END OF DAY SUMMARY
----------------------------*/
function todaySummary() {
  let today = new Date().toDateString();

  let todayItems = history.filter(h =>
    new Date(h.time).toDateString() === today
  );

  let total = todayItems.reduce((a, b) => a + b.amount, 0);

  alert(
    "Today Summary:\n" +
    "Entries: " + todayItems.length + "\n" +
    "Total: $" + total.toFixed(2)
  );
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

updateUI();

</script>

</body>
</html>
