<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Finance Control Dashboard</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 20px;
  transition: 0.3s;
  background: #fff;
  color: #111;
}

.dark { background:#111; color:#eee; }

input {
  font-size: 20px;
  padding: 12px;
  width: 90%;
  max-width: 300px;
}

button {
  padding: 10px 14px;
  margin: 5px;
  border-radius: 8px;
}

.save {
  font-size: 24px;
  background: #2ecc71;
  color: white;
  border: none;
}

.card {
  border: 1px solid #ccc;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

.bar {
  height: 14px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 5px;
}

.fill {
  height: 100%;
  background: #2ecc71;
}
</style>
</head>

<body>

<h2>Finance Control Dashboard</h2>

<button onclick="toggleDark()">Dark Mode</button>
<button onclick="todaySummary()">End-of-Day Summary</button>

<br/><br/>

<input id="amount" type="number" placeholder="Enter income or spend" />
<br/>

<button class="save" onclick="addEntry()">SAVE</button>

<div>
<button onclick="quickAdd(100)">$100</button>
<button onclick="quickAdd(200)">$200</button>
<button onclick="quickAdd(500)">$500</button>
</div>

<div class="card">
<h3>Paycheck Split Preview</h3>
<div id="split"></div>
</div>

<div class="card">
<h3>Monthly Control</h3>

<div>CC Progress</div>
<div class="bar"><div id="ccBar" class="fill"></div></div>

<div>Spending Progress</div>
<div class="bar"><div id="spendBar" class="fill"></div></div>

<div id="status"></div>
</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

<script>

let history = JSON.parse(localStorage.getItem("history") || "[]");

function addEntry() {
  let val = parseFloat(document.getElementById("amount").value);
  if (!val) return;

  history.push({
    amount: val,
    rent: val * 0.30,
    cc: val * 0.40,
    taxes: val * 0.12,
    insurance: val * 0.124,
    ira: val * 0.056,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("history", JSON.stringify(history));
  document.getElementById("amount").value = "";
  updateUI();
}

function quickAdd(v){
  document.getElementById("amount").value = v;
  addEntry();
}

function sum(k){ return history.reduce((a,b)=>a+(b[k]||0),0); }

/* -------- PAYCHECK SPLIT -------- */
function renderSplit() {
  let val = parseFloat(document.getElementById("amount").value || 0);

  document.getElementById("split").innerHTML = `
    <p>Rent: $${(val*0.30).toFixed(2)}</p>
    <p>CC: $${(val*0.40).toFixed(2)}</p>
    <p>Taxes: $${(val*0.12).toFixed(2)}</p>
    <p>Insurance: $${(val*0.124).toFixed(2)}</p>
    <p>IRA: $${(val*0.056).toFixed(2)}</p>
  `;
}

/* -------- UI -------- */
function updateUI(){

  let now = new Date();
  let m = now.getMonth();
  let y = now.getFullYear();

  let month = history.filter(h=>{
    let d=new Date(h.time);
    return d.getMonth()==m && d.getFullYear()==y;
  });

  let cc = month.reduce((a,b)=>a+b.cc,0);
  let spend = month.reduce((a,b)=>a+b.amount,0);

  let ccCap = 2000;
  let spendCap = 4000;

  // bars
  document.getElementById("ccBar").style.width =
    Math.min((cc/ccCap)*100,100)+"%";

  document.getElementById("spendBar").style.width =
    Math.min((spend/spendCap)*100,100)+"%";

  // status
  let safeToday = Math.max(0, (spendCap - spend)/30);

  document.getElementById("status").innerHTML = `
    <p><b>CC:</b> $${cc.toFixed(2)} / $${ccCap}</p>
    <p><b>Spending:</b> $${spend.toFixed(2)} / $${spendCap}</p>
    <p><b>Safe to spend today:</b> ~$${safeToday.toFixed(2)}</p>
  `;

  document.getElementById("history").innerHTML =
    history.slice().reverse()
    .map(h=>`$${h.amount} — ${h.time}`)
    .join("<br>");
}

/* -------- SUMMARY -------- */
function todaySummary(){
  let t=new Date().toDateString();

  let items=history.filter(h=>new Date(h.time).toDateString()==t);

  alert("Today: "+items.length+" entries");
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

document.getElementById("amount").addEventListener("input", renderSplit);

updateUI();

</script>

</body>
</html>
