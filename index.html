<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Tip Flow System - Goal Mode</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 20px;
  background: #fff;
  color: #111;
}

.dark { background:#111; color:#eee; }

input {
  font-size: 20px;
  padding: 10px;
  width: 90%;
  max-width: 300px;
}

button {
  padding: 10px 14px;
  margin: 5px;
  border-radius: 8px;
}

.save {
  font-size: 22px;
  background: #2ecc71;
  color: white;
  border: none;
}

.card {
  border: 1px solid #ccc;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

.bar {
  height: 14px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: #2ecc71;
}
</style>
</head>

<body>

<h2>Tip Flow System (Goal Mode)</h2>

<button onclick="toggleDark()">Dark Mode</button>
<button onclick="summary()">Today Summary</button>

<br/><br/>

<input id="amount" type="number" placeholder="Enter tip" />
<br/>

<input id="goal" type="number" placeholder="Savings Goal (e.g. 3000)" />
<br/>

<button class="save" onclick="addTip()">SAVE TIP</button>

<div>
<button onclick="quick(20)">$20</button>
<button onclick="quick(50)">$50</button>
<button onclick="quick(100)">$100</button>
</div>

<div class="card">
<h3>Goal Progress</h3>

<p><b>Goal:</b> $<span id="goalDisplay">0</span></p>
<p><b>Saved (from tips):</b> $<span id="saved">0</span></p>

<div class="bar"><div id="goalBar" class="fill"></div></div>

<p id="goalStatus"></p>
</div>

<div class="card">
<h3>Latest Tip Breakdown</h3>
<div id="latest"></div>
</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

<script>

let tips = JSON.parse(localStorage.getItem("tips") || "[]");

function addTip() {

  let val = parseFloat(document.getElementById("amount").value);
  if (!val) return;

  let entry = {
    amount: val,
    cc: val * 0.40,
    time: new Date().toLocaleString()
  };

  tips.push(entry);
  localStorage.setItem("tips", JSON.stringify(tips));

  document.getElementById("amount").value = "";
  update();
}

function quick(v){
  document.getElementById("amount").value = v;
  addTip();
}

function sum(k){
  return tips.reduce((a,b)=>a+(b[k]||0),0);
}

function update(){

  let goal = parseFloat(document.getElementById("goal").value || 0);

  let saved = sum("amount");

  document.getElementById("goalDisplay").innerText = goal.toFixed(2);
  document.getElementById("saved").innerText = saved.toFixed(2);

  let pct = goal ? (saved / goal) * 100 : 0;

  document.getElementById("goalBar").style.width =
    Math.min(pct, 100) + "%";

  document.getElementById("goalStatus").innerText =
    goal
      ? (saved >= goal
          ? "✅ Goal reached"
          : "You are " + (goal - saved).toFixed(2) + " away")
      : "Set a goal to start tracking";

  document.getElementById("latest").innerHTML =
    tips.length
      ? `<p>$${tips[tips.length-1].amount}</p>`
      : "";

  document.getElementById("history").innerHTML =
    tips.slice().reverse()
    .map(t => `$${t.amount} — ${t.time}`)
    .join("<br>");
}

function summary(){
  let today = new Date().toDateString();

  let todayTips = tips.filter(t =>
    new Date(t.time).toDateString() === today
  );

  let total = todayTips.reduce((a,b)=>a+b.amount,0);

  alert("Today: $" + total.toFixed(2) + " across " + todayTips.length + " tips");
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

document.getElementById("goal").addEventListener("input", update);

update();

</script>

</body>
</html>
